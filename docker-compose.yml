# ═══════════════════════════════════════════════════════════════════
# 0xSearchstr — Full Stack Docker Compose
# ═══════════════════════════════════════════════════════════════════
#
# Brings up the complete search engine:
#   - Meilisearch (search index)
#   - Nostr crawler (NIP-01 subscriber)
#   - Clearnet crawler (polite web crawler)
#   - Tor proxy + Tor/I2P crawler
#   - I2P router (i2pd)
#   - NIP-50 relay (Nostr search relay proxy)
#   - Abuse API (REST search + abuse reports)
#   - Frontend (React SPA served by nginx)
#
# Usage:
#   cp .env.example .env   # Edit with your config
#   docker compose up -d
#
# To run without Tor/I2P crawling:
#   docker compose up -d meilisearch nostr-crawler nip50-relay abuse-api frontend
#
# ═══════════════════════════════════════════════════════════════════

services:
  # ─── Meilisearch: Search Index Engine ───
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: 0xsearchstr-meilisearch
    restart: unless-stopped
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_ENV: production
      MEILI_MAX_INDEXING_MEMORY: 1GiB
      MEILI_LOG_LEVEL: WARN
    volumes:
      - meili-data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Nostr Crawler ───
  nostr-crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile.crawler
      args:
        SERVICE: nostr-crawler
    container_name: 0xsearchstr-nostr-crawler
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_INDEX: ${MEILI_INDEX:-0xsearchstr}
      NOSTR_RELAYS: ${NOSTR_RELAYS:-}
      NOSTR_BATCH_SIZE: ${NOSTR_BATCH_SIZE:-50}
      NOSTR_FLUSH_INTERVAL: ${NOSTR_FLUSH_INTERVAL:-5000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - ./backend/config:/app/nostr-crawler/config:ro

  # ─── Clearnet Crawler ───
  clearnet-crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile.crawler
      args:
        SERVICE: clearnet-crawler
    container_name: 0xsearchstr-clearnet-crawler
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_INDEX: ${MEILI_INDEX:-0xsearchstr}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT:-0xSearchstr/0.1}
      CLEARNET_CONCURRENCY: ${CLEARNET_CONCURRENCY:-5}
      CLEARNET_RATE_LIMIT_MS: ${CLEARNET_RATE_LIMIT_MS:-2000}
      CLEARNET_MAX_PAGES_PER_DOMAIN: ${CLEARNET_MAX_PAGES_PER_DOMAIN:-1000}
      CLEARNET_SEED_FILE: ./config/seeds-clearnet.txt
      DOMAIN_BLOCKLIST_PATH: ./config/blocklists/domains.txt
      HASH_BLOCKLIST_PATH: ./config/blocklists/hashes.txt
      KEYWORD_BLOCKLIST_PATH: ./config/blocklists/keywords.json
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - ./backend/config:/app/clearnet-crawler/config:ro

  # ─── Tor SOCKS5 Proxy ───
  tor-proxy:
    image: dperson/torproxy:latest
    container_name: 0xsearchstr-tor-proxy
    restart: unless-stopped
    ports:
      - "9050:9050"
    environment:
      TOR_NewCircuitPeriod: 120
      TOR_MaxCircuitDirtiness: 600

  # ─── I2P Router (i2pd) ───
  i2pd:
    image: purplei2p/i2pd:latest
    container_name: 0xsearchstr-i2pd
    restart: unless-stopped
    ports:
      - "4444:4444"   # HTTP proxy
      - "4447:4447"   # SAM
      - "7070:7070"   # Web console
    volumes:
      - i2pd-data:/home/i2pd/data

  # ─── Tor / I2P Crawler ───
  tor-crawler:
    build:
      context: ./backend
      dockerfile: Dockerfile.crawler
      args:
        SERVICE: tor-crawler
    container_name: 0xsearchstr-tor-crawler
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
      tor-proxy:
        condition: service_started
      i2pd:
        condition: service_started
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_INDEX: ${MEILI_INDEX:-0xsearchstr}
      TOR_SOCKS_PROXY: socks5h://tor-proxy:9050
      I2P_HTTP_PROXY: http://i2pd:4444
      TOR_CONCURRENCY: ${TOR_CONCURRENCY:-3}
      TOR_RATE_LIMIT_MS: ${TOR_RATE_LIMIT_MS:-5000}
      TOR_SEED_FILE: ./config/seeds-onion.txt
      I2P_SEED_FILE: ./config/seeds-i2p.txt
      DOMAIN_BLOCKLIST_PATH: ./config/blocklists/domains.txt
      HASH_BLOCKLIST_PATH: ./config/blocklists/hashes.txt
      KEYWORD_BLOCKLIST_PATH: ./config/blocklists/keywords.json
      BLOCKLIST_REFRESH_INTERVAL: ${BLOCKLIST_REFRESH_INTERVAL:-3600000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - ./backend/config:/app/tor-crawler/config:ro

  # ─── NIP-50 Search Relay ───
  nip50-relay:
    build:
      context: ./backend
      dockerfile: Dockerfile.relay
      args:
        SERVICE: nip50-relay
    container_name: 0xsearchstr-nip50-relay
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    ports:
      - "7777:7777"
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_INDEX: ${MEILI_INDEX:-0xsearchstr}
      NIP50_PORT: "7777"
      NIP50_HOST: "0.0.0.0"
      NIP50_MAX_LIMIT: ${NIP50_MAX_LIMIT:-100}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production

  # ─── Abuse Report API + REST Search ───
  abuse-api:
    build:
      context: ./backend
      dockerfile: Dockerfile.relay
      args:
        SERVICE: abuse-api
    container_name: 0xsearchstr-abuse-api
    restart: unless-stopped
    depends_on:
      meilisearch:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      MEILI_HOST: http://meilisearch:7700
      MEILI_API_KEY: ${MEILI_API_KEY:-change-me}
      MEILI_INDEX: ${MEILI_INDEX:-0xsearchstr}
      ABUSE_API_PORT: "8080"
      ABUSE_API_HOST: "0.0.0.0"
      ABUSE_ADMIN_TOKEN: ${ABUSE_ADMIN_TOKEN:-change-me}
      REPORTS_DIR: /app/data/reports
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - abuse-data:/app/data
      - ./backend/config:/app/abuse-api/config:ro

  # ─── Frontend (React SPA) ───
  frontend:
    build:
      context: .
      dockerfile: backend/Dockerfile.frontend
    container_name: 0xsearchstr-frontend
    restart: unless-stopped
    ports:
      - "3000:80"

volumes:
  meili-data:
    driver: local
  i2pd-data:
    driver: local
  abuse-data:
    driver: local
